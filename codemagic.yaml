# Codemagic CI/CD — builds the Nexus Capacitor app for iOS in the cloud (no Mac needed).
#
# ONE-TIME SETUP in the Codemagic dashboard before your first build:
#   1. Connect this project's Git repo to Codemagic (Applications → Add application).
#   2. Team → Integrations → App Store Connect: an App Store Connect API key named
#      "Personal" is referenced below. Change that name if your key uses a different one.
#   3. In App Store Connect, create the app record with bundle ID  com.nexusrewards.app
#      (or change BUNDLE_ID below and in capacitor.config.json to your own unique ID).
#   4. Codemagic auto-manages signing certificates/profiles once the integration is set.
#
# Then: push to your repo (or hit "Start new build") and Codemagic archives + uploads to TestFlight.

workflows:
  ios-capacitor:
    name: Nexus iOS (Capacitor → TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Personal   # name of your App Store Connect API key in Codemagic (Team settings → Integrations)
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nexusrewards.app     # keep in sync with capacitor.config.json
      vars:
        BUNDLE_ID: "com.nexusrewards.app"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm ci || npm install
          # Capacitor's local-notifications plugin is in package.json; npm install pulls it in.
      - name: Build the React web assets (dist/)
        script: npm run build
      - name: Add the iOS platform if it isn't committed, then sync web assets
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Apply managed signing profiles
        script: |
          xcode-project use-profiles
      - name: Set the build number
        script: |
          cd ios/App
          agvtool new-version -all "$PROJECT_BUILD_NUMBER"
      - name: Build the signed .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Add TestFlight tester groups here once you've created them in App Store Connect:
        # beta_groups:
        #   - Internal Testers
